kube-prometheus-stack:
  
  # 1. Grafana Settings
  grafana:
    # Point Grafana to the secret you manually created on the cluster
    admin:
      existingSecret: "grafana-admin-credentials"
      userKey: admin-user
      passwordKey: admin-password
      
    # Expose Grafana to the internet
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - grafana.teslarez.xyz
        
    # Ask Rancher Local Path for a hard drive to save dashboards
    persistence:
      enabled: true
      type: pvc
      storageClassName: "local-path"
      accessModes:
        - ReadWriteOnce
      size: 2Gi

  # 2. Prometheus Settings
  prometheus:
    prometheusSpec:
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: "local-path"
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi
